name: MERN CI/CD (Test on PR, Deploy on Merge)

on:
  # Triggers when a PR is opened or updated
  pull_request:
    branches:
      - staging 
  # Triggers when a PR is actually MERGED into staging
  push:
    branches:
      - staging 

env:
  FRONTEND_IMAGE: rohitg2304/cummins-frontend
  BACKEND_IMAGE: rohitg2304/cummins-backend
  IMAGE_TAG: ${{ github.sha }} 
  MANIFEST_REPO: Parikshit09-coder/Cummins-Software-hackathon-k8s

jobs:
  # ==========================================
  # 1. TESTING PHASE (Runs on PR AND Merge)
  # ==========================================
  test-code:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Add your test commands here
      # - run: cd backend && npm ci && npm run test
      # - run: cd frontend && npm ci && npm run test
      - run: echo "Running tests..."

  # ==========================================
  # 2. BUILD & PUSH PHASE (Runs ONLY on Merge)
  # ==========================================
  build-and-push:
    name: Build & Push to Docker Hub
    needs: test-code
    # 🚨 THE MAGIC LOCK: This prevents the job from running on PRs
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Ensure this matches your folder structure
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:staging

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Ensure this matches your folder structure
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:staging

  # ==========================================
  # 3. GITOPS MANIFEST UPDATE (Runs ONLY on Merge)
  # ==========================================
  update-manifest:
    name: Update K8s Manifest for ArgoCD
    needs: build-and-push
    # 🚨 THE MAGIC LOCK: This prevents the job from running on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: manifests

      - name: Update Kubernetes YAMLs
        working-directory: manifests
        run: |
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" deployment.yaml || true
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}|g" deployment.yaml || true

      - name: Commit to Manifest Repo
        working-directory: manifests
        run: |
          git config user.name "GitOps Bot"
          git config user.email "gitops@cummins-hackathon.local"
          git add .
          git commit -m "chore(deploy): update staging images to ${{ env.IMAGE_TAG }}"
          git push origin main